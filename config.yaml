# Configuration for GAN-DRL Cyber Deception Smart-Grid Reproducibility Pipeline

project:
  name: "GAN-DRL-Cyber-Deception-SmartGrid"
  version: "1.0.0"
  description: "Self-adaptive GAN-DQN cyber deception framework for resilient smart-grid network defense"

paths:
  generated_data_dir: "data/generated"
  model_dir: "results/models"
  result_dir: "results"
  figure_dir: "figures"

reproducibility:
  global_seed: 42
  run_seeds: [11, 23, 37, 42, 59, 71, 83, 97, 109, 131]
  deterministic: true
  num_runs: 10

smartgrid:
  nodes: 32
  links: 76
  regional_control_zones: 4
  central_scada_master: 1
  protocols: ["TCP_IP", "DNP3_STYLE"]
  simulation_cycles: 20000
  simulated_hours: 5.0
  telemetry_interval_ms: 100
  base_latency_ms: 18.0
  latency_jitter_ms: 4.0
  bandwidth_mbps: 100
  feature_count: 64

traffic:
  benign_ratio: 0.68
  adversarial_ratio: 0.32
  samples_per_run: 12000
  train_split: 0.70
  validation_split: 0.15
  test_split: 0.15
  attack_types:
    - command_injection
    - protocol_fuzzing
    - lateral_movement
    - coordinated_dos
    - spoofed_telemetry
    - replay_attack
    - covert_channel_flooding

gan:
  enabled: true
  latent_dim: 64
  generator_hidden_dims: [128, 256, 128]
  discriminator_hidden_dims: [128, 256, 128]
  activation: "leaky_relu"
  dropout: 0.20
  epochs: 80
  batch_size: 128
  learning_rate: 0.0002
  beta1: 0.5
  beta2: 0.999
  synthetic_attack_samples: 6000
  kl_divergence_threshold: 0.08
  max_attack_injection_rate: 0.35
  entropy_sensitivity: 1.25

dqn:
  enabled: true
  state_dim: 96
  action_space:
    - maintain
    - deploy_decoy
    - reroute_flow
    - quarantine_node
    - increase_deception_level
    - activate_honeypot_cluster
  hidden_dims: [256, 128, 64]
  episodes: 3000
  max_steps_per_episode: 120
  replay_memory_size: 50000
  warmup_steps: 1000
  batch_size: 128
  gamma: 0.97
  learning_rate: 0.0005
  target_update_interval: 100
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995

reward:
  system_utility_weight: 1.00
  compromise_cost_weight: 1.40
  deception_gain_weight: 0.90
  false_alarm_penalty_weight: 0.45
  recovery_bonus_weight: 0.70
  service_disruption_penalty_weight: 0.85

digital_immune_mechanism:
  enabled: true
  resilience_margin: 0.62
  attack_pressure_weight: 0.40
  deception_freshness_weight: 0.35
  service_quality_weight: 0.25
  momentum_gain: 0.80
  pressure_derivative_gain: 0.35
  decoy_rotation_interval: 250
  memory_bank_size: 500
  self_healing_actions:
    - decoy_rotation
    - traffic_relabeling
    - topology_rewiring
    - honeypot_refresh
    - recovery_prioritization

baselines:
  static_ids:
    enabled: true
    detection_threshold: 0.65
  pca_anomaly_detector:
    enabled: true
    variance_retained: 0.95
    anomaly_percentile: 95
  non_adaptive_drl:
    enabled: true
    use_gan: false
    use_deception: false
    use_dim: false
  randomized_deception:
    enabled: true
    decoy_probability: 0.15

ablation:
  variants:
    - name: "DRL_only"
      use_gan: false
      use_deception: false
      use_dim: false
    - name: "GAN_DRL_no_deception"
      use_gan: true
      use_deception: false
      use_dim: false
    - name: "DRL_deception_no_GAN"
      use_gan: false
      use_deception: true
      use_dim: false
    - name: "Full_GAN_DRL_Deception_DIM"
      use_gan: true
      use_deception: true
      use_dim: true

metrics:
  compute_mttc: true
  compute_fpr: true
  compute_rrl: true
  compute_dus: true
  compute_auc: true
  compute_attack_surface_reduction: true
  compute_confidence_intervals: true
  confidence_level: 0.95
  statistical_test: "paired_t_test"
  significance_level: 0.01

expected_reference_outputs:
  static_ids_mttc: 17.4
  anomaly_detector_mttc: 28.9
  non_adaptive_drl_mttc: 33.2
  randomized_deception_mttc: 37.5
  proposed_mttc: 78.6
  static_ids_fpr: 14.2
  proposed_fpr: 3.4
  baseline_rrl: 39.2
  proposed_rrl: 12.7
  proposed_auc: 0.96
  attack_surface_reduction_percent: 61.4

plots:
  dpi: 300
  format: "png"
  save_figures: true
  figures:
    - resilience_over_time
    - dqn_reward_curve
    - attacker_inference_heatmap
    - entropy_policy_strength
    - roc_comparison
    - ablation_results
